name: Bug report
description: Report a reproducible problem in a lesson, command, or shared implementation.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the exact command or notebook cell and the full error.
      render: shell
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python, PyTorch, operating system, and device.
    validations:
      required: true
